<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TasteCraft - AI Dining Curator</title>
  <style>
    :root {
      --amber: #d4a373;
      --sage: #8b9d83;
      --clay: #c97c7c;
      --ink: #1a1a1a;
      --ink-muted: #6b6b6b;
      --ink-faint: #a0a0a0;
      --bg: #fafaf9;
      --surface: #ffffff;
      --border: #e5e5e0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 24px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: var(--amber);
    }

    .header-pill {
      font-size: 13px;
      color: var(--ink-muted);
      padding: 6px 12px;
      background: var(--bg);
      border-radius: 20px;
    }

    .main-content {
      flex: 1;
      padding: 60px 40px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    .step-progress {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.3s;
    }

    .step-dot.active {
      background: var(--amber);
      width: 24px;
      border-radius: 4px;
    }

    .step-dot.done {
      background: var(--sage);
    }

    .section-eyebrow {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--ink-muted);
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .section-sub {
      font-size: 16px;
      color: var(--ink-muted);
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .display {
      font-size: 32px;
    }

    .field-block {
      margin-bottom: 40px;
    }

    .field-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--ink);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .cuisine-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
    }

    .cuisine-card {
      padding: 20px;
      border: 2px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: var(--surface);
    }

    .cuisine-card:hover {
      border-color: var(--amber);
      background: rgba(212, 163, 115, 0.05);
    }

    .cuisine-card.selected {
      border-color: var(--amber);
      background: rgba(212, 163, 115, 0.1);
    }

    .cuisine-emoji {
      font-size: 32px;
    }

    .cuisine-label {
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      color: var(--ink);
    }

    .pill-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .pill {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      color: var(--ink);
    }

    .pill:hover:not(:disabled) {
      border-color: var(--ink-muted);
      background: var(--bg);
    }

    .pill.selected {
      background: var(--amber);
      border-color: var(--amber);
      color: white;
    }

    .tag-input-wrapper {
      flex: 1;
    }

    .tag-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .tag-input:focus {
      outline: none;
      border-color: var(--amber);
    }

    .input-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .tag-add-btn {
      padding: 12px 20px;
      background: var(--amber);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .tag-add-btn:hover {
      opacity: 0.9;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
    }

    .tag-remove {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: var(--ink-muted);
      padding: 0;
      line-height: 1;
    }

    .tag-remove:hover {
      color: var(--ink);
    }

    .input-area {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      font-family: inherit;
      color: var(--ink);
    }

    .input-area:focus {
      outline: none;
      border-color: var(--amber);
    }

    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--ink-muted);
    }

    .slider-label strong {
      color: var(--amber);
      font-size: 16px;
      font-weight: 700;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: var(--border);
      outline: none;
      -webkit-appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--amber);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--amber);
      cursor: pointer;
      border: none;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid var(--border);
    }

    .btn-back, .btn-next, .btn-generate, .btn-restart {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-back {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--ink);
    }

    .btn-back:hover:not(:disabled) {
      border-color: var(--ink);
      background: var(--bg);
    }

    .btn-back:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-next, .btn-generate, .btn-restart {
      background: var(--amber);
      color: white;
    }

    .btn-next:hover, .btn-generate:hover, .btn-restart:hover {
      opacity: 0.9;
    }

    .btn-next:disabled, .btn-generate:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-generate {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .loading-ring {
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-banner {
      padding: 16px 20px;
      background: #fde8e8;
      border: 1px solid #f5c6c6;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #c97c7c;
    }

    .results-header {
      margin-bottom: 40px;
    }

    .results-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .results-chip {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 600;
    }

    .chip-amber {
      background: rgba(212, 163, 115, 0.15);
      color: #8b6f47;
    }

    .chip-sage {
      background: rgba(139, 157, 131, 0.15);
      color: #5a6b52;
    }

    .chip-clay {
      background: rgba(201, 124, 124, 0.15);
      color: #7a4f4f;
    }

    .rec-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .rec-card {
      padding: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      animation: slideUp 0.5s ease-out forwards;
      opacity: 0;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .rec-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .rec-num {
      font-size: 20px;
      font-weight: 700;
      color: var(--amber);
    }

    .rec-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
    }

    .rec-match {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      background: var(--bg);
      border-radius: 12px;
      color: var(--sage);
    }

    .rec-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .rec-tag {
      display: inline-block;
      padding: 4px 10px;
      background: rgba(212, 163, 115, 0.1);
      border-radius: 4px;
      font-size: 12px;
      color: #8b6f47;
    }

    .rec-reason {
      font-size: 14px;
      line-height: 1.5;
      color: var(--ink-muted);
      margin-bottom: 12px;
    }

    .rec-highlight {
      font-size: 13px;
      font-weight: 600;
      color: var(--amber);
      margin-bottom: 0;
    }

    @media (max-width: 600px) {
      .main-content {
        padding: 40px 24px;
      }

      .section-title {
        font-size: 28px;
      }

      .cuisine-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .rec-grid {
        grid-template-columns: 1fr;
      }

      .nav-row {
        flex-direction: column;
        gap: 12px;
      }

      .nav-row > button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState } = React;

const CUISINES = [
  { id: 'japanese', label: 'Japanese', emoji: '🍣' },
  { id: 'italian', label: 'Italian', emoji: '🍝' },
  { id: 'mexican', label: 'Mexican', emoji: '🌮' },
  { id: 'indian', label: 'Indian', emoji: '🍛' },
  { id: 'french', label: 'French', emoji: '🥐' },
  { id: 'spanish', label: 'Spanish', emoji: '🥘' },
  { id: 'thai', label: 'Thai', emoji: '🥡' },
  { id: 'korean', label: 'Korean', emoji: '🍖' },
  { id: 'middle_eastern', label: 'Middle Eastern', emoji: '🍢' },
  { id: 'chinese', label: 'Chinese', emoji: '🥢' },
  { id: 'mediterranean', label: 'Mediterranean', emoji: '🫒' },
  { id: 'vietnamese', label: 'Vietnamese', emoji: '🍲' },
];

const DIETARY = [
  'Vegetarian', 'Vegan', 'Gluten-Free', 'Halal', 'Kosher',
  'Dairy-Free', 'Nut-Free', 'Low-Carb / Keto', 'No Restrictions',
];

const VIBES = [
  'Romantic date night', 'Casual with friends', 'Family-friendly',
  'Business lunch', 'Solo dining', 'Celebration / special occasion',
  'Quick & convenient', 'Long leisurely meal',
];

const SOCIAL_INTERESTS = [
  'Farm-to-table', 'Hidden gems', 'Celeb chef spots', 'Michelin-starred',
  'Street food', 'Rooftop / scenic view', 'Live music', 'Trendy & Instagrammable',
  'Cozy & intimate', 'Late-night bites', 'Brunch culture', 'Wine / craft cocktails',
];

function StepDots({ current, total }) {
  return (
    <div className="step-progress">
      {Array.from({ length: total }, (_, i) => (
        <div
          key={i}
          className={`step-dot ${i === current ? 'active' : i < current ? 'done' : ''}`}
        />
      ))}
    </div>
  );
}

function PillSelect({ options, selected, onToggle, max, className = '' }) {
  return (
    <div className={`pill-grid ${className}`}>
      {options.map(opt => {
        const isSelected = selected.includes(opt);
        const isDisabled = !isSelected && max && selected.length >= max;
        return (
          <button
            key={opt}
            className={`pill ${isSelected ? 'selected' : ''}`}
            style={isDisabled ? { opacity: 0.4, cursor: 'not-allowed' } : {}}
            onClick={() => !isDisabled && onToggle(opt)}
          >
            {opt}
          </button>
        );
      })}
    </div>
  );
}

function TagInput({ tags, onAdd, onRemove, placeholder }) {
  const [val, setVal] = useState('');
  const add = () => {
    const trimmed = val.trim();
    if (trimmed && !tags.includes(trimmed)) { onAdd(trimmed); setVal(''); }
  };
  return (
    <div>
      <div className="input-row">
        <div className="tag-input-wrapper">
          <input
            className="tag-input"
            value={val}
            onChange={e => setVal(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && add()}
            placeholder={placeholder}
          />
        </div>
        <button className="tag-add-btn" onClick={add}>Add</button>
      </div>
      {tags.length > 0 && (
        <div className="tag-list">
          {tags.map(tag => (
            <span key={tag} className="tag-item">
              {tag}
              <button className="tag-remove" onClick={() => onRemove(tag)}>×</button>
            </span>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─── Step 1: Cuisine & Dietary ─── */
function Step1({ data, setData, onNext }) {
  const toggle = (list, val) => {
    const key = list;
    const curr = data[key];
    setData(prev => ({
      ...prev,
      [key]: curr.includes(val) ? curr.filter(x => x !== val) : [...curr, val],
    }));
  };

  return (
    <div>
      <StepDots current={0} total={4} />
      <p className="section-eyebrow">Step 1 of 4</p>
      <h1 className="section-title display">What do you <span style={{fontStyle:'italic',color:'var(--amber)'}}>love</span> to eat?</h1>
      <p className="section-sub">Select your favorite cuisines and any dietary requirements we should know about.</p>

      <div className="field-block">
        <span className="field-label">Favorite cuisines (pick any)</span>
        <div className="cuisine-grid">
          {CUISINES.map(c => (
            <div
              key={c.id}
              className={`cuisine-card ${data.cuisines.includes(c.id) ? 'selected' : ''}`}
              onClick={() => toggle('cuisines', c.id)}
            >
              <span className="cuisine-emoji">{c.emoji}</span>
              <span className="cuisine-label">{c.label}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="field-block">
        <span className="field-label">Dietary preferences</span>
        <PillSelect
          options={DIETARY}
          selected={data.dietary}
          onToggle={val => toggle('dietary', val)}
        />
      </div>

      <div className="nav-row">
        <div />
        <button
          className="btn-next"
          onClick={onNext}
          disabled={data.cuisines.length === 0}
        >
          Continue →
        </button>
      </div>
    </div>
  );
}

/* ─── Step 2: Past Experiences ─── */
function Step2({ data, setData, onBack, onNext }) {
  const [spendVal, setSpendVal] = useState(data.avgSpend || 50);

  const updateSpend = val => {
    setSpendVal(val);
    setData(prev => ({ ...prev, avgSpend: val }));
  };

  const spendLabel = v => {
    if (v <= 20) return 'Budget ($)';
    if (v <= 45) return 'Casual ($$)';
    if (v <= 80) return 'Mid-range ($$$)';
    return 'Fine dining ($$$$)';
  };

  return (
    <div>
      <StepDots current={1} total={4} />
      <p className="section-eyebrow">Step 2 of 4</p>
      <h1 className="section-title display">Your dining <span style={{fontStyle:'italic',color:'var(--amber)'}}>history</span></h1>
      <p className="section-sub">Tell us about places you've visited and what made them memorable — or not.</p>

      <div className="field-block">
        <span className="field-label">Restaurants you've loved (press Enter or Add)</span>
        <TagInput
          tags={data.lovedPlaces}
          onAdd={val => setData(prev => ({ ...prev, lovedPlaces: [...prev.lovedPlaces, val] }))}
          onRemove={val => setData(prev => ({ ...prev, lovedPlaces: prev.lovedPlaces.filter(x => x !== val) }))}
          placeholder="e.g. Nobu, The French Laundry, Joe's Pizza…"
        />
      </div>

      <div className="field-block">
        <span className="field-label">Dishes or ingredients you always order</span>
        <TagInput
          tags={data.favDishes}
          onAdd={val => setData(prev => ({ ...prev, favDishes: [...prev.favDishes, val] }))}
          onRemove={val => setData(prev => ({ ...prev, favDishes: prev.favDishes.filter(x => x !== val) }))}
          placeholder="e.g. truffle pasta, spicy tuna roll, lamb chops…"
        />
      </div>

      <div className="field-block">
        <span className="field-label">Anything you actively dislike or avoid?</span>
        <textarea
          className="input-area"
          value={data.dislikes}
          onChange={e => setData(prev => ({ ...prev, dislikes: e.target.value }))}
          placeholder="e.g. very loud spaces, overly sweet desserts, chains, food courts…"
          rows={3}
        />
      </div>

      <div className="field-block">
        <span className="field-label">Typical spending per person</span>
        <div className="slider-row">
          <div className="slider-label">
            <span>Budget</span>
            <strong>${spendVal} — {spendLabel(spendVal)}</strong>
            <span>Fine dining</span>
          </div>
          <input
            type="range" min={10} max={150} step={5}
            value={spendVal}
            onChange={e => updateSpend(Number(e.target.value))}
          />
        </div>
      </div>

      <div className="nav-row">
        <button className="btn-back" onClick={onBack}>← Back</button>
        <button className="btn-next" onClick={onNext}>Continue →</button>
      </div>
    </div>
  );
}

/* ─── Step 3: Lifestyle & Social ─── */
function Step3({ data, setData, onBack, onNext }) {
  const toggle = (list, val) => {
    const curr = data[list];
    setData(prev => ({
      ...prev,
      [list]: curr.includes(val) ? curr.filter(x => x !== val) : [...curr, val],
    }));
  };

  return (
    <div>
      <StepDots current={2} total={4} />
      <p className="section-eyebrow">Step 3 of 4</p>
      <h1 className="section-title display">Your <span style={{fontStyle:'italic',color:'var(--amber)'}}>vibe</span> & lifestyle</h1>
      <p className="section-sub">Help us understand the experience you're after — beyond just the food.</p>

      <div className="field-block">
        <span className="field-label">What kind of dining occasions are you planning for?</span>
        <PillSelect
          options={VIBES}
          selected={data.vibes}
          onToggle={val => toggle('vibes', val)}
        />
      </div>

      <div className="field-block">
        <span className="field-label">Social & food media interests (what catches your eye?)</span>
        <PillSelect
          options={SOCIAL_INTERESTS}
          selected={data.socialInterests}
          onToggle={val => toggle('socialInterests', val)}
        />
      </div>

      <div className="field-block">
        <span className="field-label">Anything else about your taste or lifestyle?</span>
        <textarea
          className="input-area"
          value={data.freeform}
          onChange={e => setData(prev => ({ ...prev, freeform: e.target.value }))}
          placeholder="e.g. I follow @eater, love natural wine, prefer chef's tasting menus, allergic to shellfish…"
          rows={3}
        />
      </div>

      <div className="nav-row">
        <button className="btn-back" onClick={onBack}>← Back</button>
        <button className="btn-next" onClick={onNext}>Continue →</button>
      </div>
    </div>
  );
}

/* ─── Step 4: Location & Final ─── */
function Step4({ data, setData, onBack, onGenerate, loading, error }) {
  return (
    <div>
      <StepDots current={3} total={4} />
      <p className="section-eyebrow">Step 4 of 4</p>
      <h1 className="section-title display">Almost <span style={{fontStyle:'italic',color:'var(--amber)'}}>there</span></h1>
      <p className="section-sub">Just a few last details so we can tailor suggestions to your exact context.</p>

      <div className="field-block">
        <span className="field-label">City / neighborhood you're dining in</span>
        <input
          className="tag-input"
          style={{width:'100%'}}
          value={data.location}
          onChange={e => setData(prev => ({ ...prev, location: e.target.value }))}
          placeholder="e.g. West Village, NYC · Shoreditch, London · Marais, Paris"
        />
      </div>

      <div className="field-block">
        <span className="field-label">Any special requests or context for tonight?</span>
        <textarea
          className="input-area"
          value={data.context}
          onChange={e => setData(prev => ({ ...prev, context: e.target.value }))}
          placeholder="e.g. first date, want to impress, she's visiting from Tokyo, need outdoor seating, party of 6…"
          rows={3}
        />
      </div>

      {error && (
        <div className="error-banner">
          <strong>Something went wrong:</strong> {error}
        </div>
      )}

      <div className="nav-row">
        <button className="btn-back" onClick={onBack} disabled={loading}>← Back</button>
        <button
          className="btn-generate"
          onClick={onGenerate}
          disabled={loading || !data.location.trim()}
        >
          {loading ? (
            <>
              <div className="loading-ring" style={{width:20,height:20,borderWidth:2}} />
              Curating…
            </>
          ) : (
            <>✦ Generate My Recommendations</>
          )}
        </button>
      </div>
    </div>
  );
}

/* ─── Results ─── */
function Results({ recs, profile, onRestart }) {
  const cuisineNames = (profile.cuisines || []).map(id => {
    const c = CUISINES.find(x => x.id === id);
    return c ? c.label : id;
  });

  return (
    <div>
      <div className="results-header">
        <p className="section-eyebrow">Your Curated Picks</p>
        <h1 className="section-title display">
          Dining in <span style={{fontStyle:'italic',color:'var(--amber)'}}>{profile.location}</span>
        </h1>
        <div className="results-meta">
          {cuisineNames.slice(0,3).map(c => (
            <span key={c} className="results-chip chip-amber">{c}</span>
          ))}
          {(profile.dietary || []).filter(d => d !== 'No Restrictions').map(d => (
            <span key={d} className="results-chip chip-sage">{d}</span>
          ))}
          {profile.avgSpend && (
            <span className="results-chip chip-clay">
              {'$'.repeat(profile.avgSpend <= 20 ? 1 : profile.avgSpend <= 45 ? 2 : profile.avgSpend <= 80 ? 3 : 4)}
            </span>
          )}
        </div>
      </div>

      <div className="rec-grid">
        {recs.map((rec, i) => (
          <div key={i} className="rec-card" style={{animationDelay:`${i*0.1}s`}}>
            <div className="rec-top">
              <div>
                <div style={{display:'flex',alignItems:'baseline',gap:10,marginBottom:4}}>
                  <span className="rec-num">{String(i+1).padStart(2,'0')}</span>
                  <span className="rec-name">{rec.name}</span>
                </div>
                {rec.cuisineType && (
                  <div style={{fontSize:13,color:'var(--ink-muted)',marginLeft:46}}>
                    {rec.cuisineType}
                    {rec.priceRange && <span style={{marginLeft:8,color:'var(--amber)',fontWeight:500}}>{rec.priceRange}</span>}
                  </div>
                )}
              </div>
              {rec.matchScore && (
                <span className="rec-match">{rec.matchScore}% match</span>
              )}
            </div>

            {rec.tags && rec.tags.length > 0 && (
              <div className="rec-tags">
                {rec.tags.map(t => <span key={t} className="rec-tag">{t}</span>)}
              </div>
            )}

            <p className="rec-reason">{rec.reason}</p>
            {rec.orderThis && (
              <p className="rec-highlight">✦ Try: {rec.orderThis}</p>
            )}
          </div>
        ))}
      </div>

      <div style={{marginTop:40,display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
        <button className="btn-restart" onClick={onRestart}>
          ← Refine my profile
        </button>
        <span style={{fontSize:13,color:'var(--ink-faint)',fontStyle:'italic'}}>
          Recommendations generated by AI — always verify hours & availability
        </span>
      </div>
    </div>
  );
}

/* ─── Main App ─── */
function App() {
  const [step, setStep] = useState(0);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [recs, setRecs] = useState(null);

  const [profile, setProfile] = useState({
    cuisines: [],
    dietary: [],
    lovedPlaces: [],
    favDishes: [],
    dislikes: '',
    avgSpend: 50,
    vibes: [],
    socialInterests: [],
    freeform: '',
    location: '',
    context: '',
  });

  const buildPrompt = () => {
    const cuisineNames = profile.cuisines.map(id => {
      const c = CUISINES.find(x => x.id === id);
      return c ? c.label : id;
    });

    return `You are an elite dining curator with encyclopedic knowledge of restaurants worldwide. Based on this diner's detailed profile, generate exactly 5 highly personalized restaurant recommendations.

DINER PROFILE:
- Location: ${profile.location}
- Favorite cuisines: ${cuisineNames.join(', ') || 'open to anything'}
- Dietary requirements: ${profile.dietary.join(', ') || 'none'}
- Restaurants they've loved: ${profile.lovedPlaces.join(', ') || 'not specified'}
- Favorite dishes/ingredients: ${profile.favDishes.join(', ') || 'not specified'}
- Dislikes/avoids: ${profile.dislikes || 'nothing mentioned'}
- Typical spend per person: $${profile.avgSpend}
- Dining occasions: ${profile.vibes.join(', ') || 'not specified'}
- Social/lifestyle interests: ${profile.socialInterests.join(', ') || 'not specified'}
- Additional context: ${profile.freeform || 'none'}
- Special context for today: ${profile.context || 'none'}

Return ONLY a JSON array with exactly 5 objects. No preamble, no markdown, no explanation. Each object must have:
{
  "name": "Restaurant Name",
  "cuisineType": "Cuisine type & style (e.g. Modern Japanese Omakase)",
  "priceRange": "$$ or $$$ or $$$$ matching their budget",
  "matchScore": integer 85-99,
  "tags": ["tag1","tag2","tag3"] (3-4 short descriptors like "romantic", "open fire grill", "natural wine", "reservations essential"),
  "reason": "2-3 sentence personalized explanation of WHY this fits them specifically — reference their profile details",
  "orderThis": "The one dish or thing to order/experience"
}

Make recommendations that feel genuinely discovered and curated — not the obvious tourist picks. Mix well-known gems with lesser-known finds. Respect all dietary requirements strictly.`;
  };

  const generate = async () => {
    setLoading(true);
    setError('');
    try {
      const res = await fetch('/api/recommendations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: buildPrompt() }),
      });

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || `Request failed with status ${res.status}`);
      }

      const data = await res.json();
      const text = data.text;
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      if (!Array.isArray(parsed)) throw new Error('Unexpected response format');
      setRecs(parsed);
      setStep(4);
    } catch (err) {
      setError(err.message || 'Failed to generate recommendations. Please try again.');
    } finally {
      setLoading(false);
    }
  };

  const restart = () => {
    setRecs(null);
    setStep(0);
    setError('');
  };

  return (
    <div className="app-shell">
      <header className="header">
        <div className="logo display">Taste<span>Craft</span></div>
        {step < 4 && <span className="header-pill">AI-Powered Dining</span>}
        {step === 4 && (
          <button className="btn-restart" onClick={restart}>New search</button>
        )}
      </header>

      <main className="main-content">
        {step === 0 && (
          <Step1
            data={profile}
            setData={setProfile}
            onNext={() => setStep(1)}
          />
        )}
        {step === 1 && (
          <Step2
            data={profile}
            setData={setProfile}
            onBack={() => setStep(0)}
            onNext={() => setStep(2)}
          />
        )}
        {step === 2 && (
          <Step3
            data={profile}
            setData={setProfile}
            onBack={() => setStep(1)}
            onNext={() => setStep(3)}
          />
        )}
        {step === 3 && (
          <Step4
            data={profile}
            setData={setProfile}
            onBack={() => setStep(2)}
            onGenerate={generate}
            loading={loading}
            error={error}
          />
        )}
        {step === 4 && recs && (
          <Results
            recs={recs}
            profile={profile}
            onRestart={restart}
          />
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
